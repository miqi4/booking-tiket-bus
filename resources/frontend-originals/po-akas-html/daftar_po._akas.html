<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Daftar - Bus Akas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {

          theme: {
            extend: {

                      "primary": "#004782",

                      "on-primary-fixed-variant": "#004883",

                      "surface-container-lowest": "#ffffff",
                      "secondary-fixed-dim": "#a3d480",
                      "surface-bright": "#fcf9f3",
                      "on-surface": "#1c1c19",

                      "on-surface-variant": "#424751",
                      "surface-container-low": "#f6f3ee",
                      "secondary-fixed": "#bef19a",
                      "on-error": "#ffffff",
                      "outline-variant": "#c2c6d2",
                      "inverse-primary": "#a4c9ff",
                      "primary-fixed-dim": "#a4c9ff",
                      "outline": "#727782",
                      "on-tertiary-fixed": "#2d1600",
                      "inverse-surface": "#31302d",
                      "secondary-container": "#bbee97",
                      "tertiary-fixed-dim": "#fab97e",
                      "tertiary-fixed": "#ffdcc0",
                      "surface-container-highest": "#e5e2dd",
                      "surface-container-high": "#ebe8e2",
                      "on-primary": "#ffffff",
                      "on-error-container": "#93000a",
                      "inverse-on-surface": "#f3f0eb",
                      "tertiary": "#683c0a",
                      "secondary": "#3e6922",
                      "on-secondary": "#ffffff",
                      "on-secondary-container": "#426d26",
                      "on-background": "#1c1c19",
                      "primary-fixed": "#d4e3ff",
                      "on-primary-container": "#c1d9ff",
                      "on-tertiary-container": "#ffcea5",
                      "surface-container": "#f1ede8",
                      "primary-container": "#185fa5",
                      "on-tertiary-fixed-variant": "#683c0a",
                      "surface-variant": "#e5e2dd",
                      "surface": "#fcf9f3",
                      "on-secondary-fixed-variant": "#27500a"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "container-max": "1200px",
                      "sm": "12px",
                      "gutter": "20px",
                      "base": "8px",
                      "xl": "64px",
                      "lg": "48px",
                      "xs": "4px",
                      "md": "24px"
              },
              "fontFamily": {
                      "h2": [
                              "Work Sans"
                      ],
                      "caption": [
                              "Work Sans"
                      ],
                      "h1": [

<style>
        body { font-family: 'Work Sans', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col">
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center p-gutter relative overflow-hidden">
<!-- Decorative Background Elements -->
<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-5%] w-[500px] h-[500px] bg-primary-container/10 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[400px] h-[400px] bg-secondary-container/20 rounded-full blur-3xl"></div>
</div>
<div class="w-full max-w-md z-10 relative">
<!-- Header/Logo area within form context -->
<div class="text-center mb-lg">
<a class="inline-block text-h1 font-h1 text-primary tracking-tight mb-xs" href="#">Bus Akas</a>
<p class="text-body font-body text-on-surface-variant">Buat akun untuk perjalanan Anda</p>
</div>
<!-- Registration Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant p-md">
<form action="#" class="space-y-sm" method="POST">
<!-- Nama Lengkap -->
<div>
<label class="block text-label-form font-label-form text-on-surface mb-base" for="fullName">Nama Lengkap</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline-variant">person</span>
<input class="w-full pl-xl pr-sm py-sm bg-surface-container-low border border-outline-variant rounded-DEFAULT text-body font-body text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="fullName" name="fullName" placeholder="Masukkan nama lengkap sesuai KTP" required="" type="text"/>
</div>
</div>
<!-- Email -->
<div>
<label class="block text-label-form font-label-form text-on-surface mb-base" for="email">Alamat Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline-variant">mail</span>
<input class="w-full pl-xl pr-sm py-sm bg-surface-container-low border border-outline-variant rounded-DEFAULT text-body font-body text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="email" name="email" placeholder="contoh@email.com" required="" type="email"/>
</div>
</div>
<!-- Nomor HP -->
<div>
<label class="block text-label-form font-label-form text-on-surface mb-base" for="phone">Nomor Handphone</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline-variant">phone_iphone</span>
<input class="w-full pl-xl pr-sm py-sm bg-surface-container-low border border-outline-variant rounded-DEFAULT text-body font-body text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="phone" name="phone" placeholder="081234567890" required="" type="tel"/>
</div>
</div>
<!-- Password -->
<div>
<label class="block text-label-form font-label-form text-on-surface mb-base" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline-variant">lock</span>
<input class="w-full pl-xl pr-sm py-sm bg-surface-container-low border border-outline-variant rounded-DEFAULT text-body font-body text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="password" name="password" placeholder="Minimal 8 karakter" required="" type="password"/>
<button aria-label="Tampilkan password" class="absolute right-sm top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Konfirmasi Password -->
<div>
<label class="block text-label-form font-label-form text-on-surface mb-base" for="confirmPassword">Konfirmasi Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline-variant">lock_reset</span>
<input class="w-full pl-xl pr-sm py-sm bg-surface-container-low border border-outline-variant rounded-DEFAULT text-body font-body text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="confirmPassword" name="confirmPassword" placeholder="Ketik ulang password" required="" type="password"/>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start mt-sm">
<div class="flex items-center h-5">
<input class="w-4 h-4 text-primary bg-surface-container-low border-outline-variant rounded focus:ring-primary focus:ring-2" id="terms" name="terms" required="" type="checkbox"/>
</div>
<div class="ml-sm text-caption font-caption">
<label class="text-on-surface-variant" for="terms">
                                Saya menyetujui <a class="text-primary hover:underline font-medium" href="#">Syarat &amp; Ketentuan</a> serta <a class="text-primary hover:underline font-medium" href="#">Kebijakan Privasi</a> Bus Akas.
                            </label>
</div>
</div>
<!-- Submit Button -->
<button class="w-full mt-md bg-primary text-on-primary py-sm px-md rounded-DEFAULT font-label-form text-label-form hover:bg-primary-container hover:text-on-primary-container transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary shadow-sm flex items-center justify-center gap-base" type="submit">
<span>Daftar Akun</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Alternate Login -->
<div class="mt-md pt-md border-t border-outline-variant text-center">
<p class="text-body font-body text-on-surface-variant">
                        Sudah punya akun? 
                        <a class="text-primary font-semibold hover:underline transition-all" href="#">Masuk di sini</a>
</p>
</div>
</div>
<!-- Back to Home Link -->
<div class="text-center mt-lg">
<a class="inline-flex items-center gap-xs text-caption font-caption text-on-surface-variant hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[16px]">arrow_back</span>
                     Kembali ke Beranda
                 </a>
</div>
</div>
</main>
</body></html>
