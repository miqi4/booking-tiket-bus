<div class="flex justify-between items-center w-full px-gutter max-w-container-max mx-auto h-xl">
<div class="text-h2 font-h2 text-primary font-extrabold tracking-tight">Bus Akas</div>
<!-- Suppressed Nav Links & Search for focused flow -->
<button class="text-on-surface-variant hover:text-primary transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-[20px]">close</span>
<span class="hidden md:inline font-label-form text-label-form">Tutup</span>
</button>
</div>
</header>
<main class="flex-grow w-full max-w-container-max mx-auto px-gutter py-md md:py-lg flex flex-col items-center">

<div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-[2px] bg-surface-container-high -z-10"></div>

<!-- Step 1: Completed -->
<div class="flex flex-col items-center gap-base z-10">
<div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center text-label-form font-label-form shadow-sm">
<span class="material-symbols-outlined text-[16px]">check</span>
</div>
<span class="text-caption font-caption text-primary hidden md:block">Pilih Kursi</span>
</div>
<!-- Step 2: Active -->
<div class="flex flex-col items-center gap-base z-10">
<div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center text-label-form font-label-form shadow-sm ring-4 ring-primary/20">
                        2
                    </div>
<span class="text-caption font-caption text-primary font-bold hidden md:block">Isi Data</span>
</div>
<!-- Step 3: Upcoming -->
<div class="flex flex-col items-center gap-base z-10">
<div class="w-8 h-8 rounded-full bg-surface-container-highest border-2 border-outline-variant text-on-surface-variant flex items-center justify-center text-label-form font-label-form">

                    </div>
<span class="text-caption font-caption text-on-surface-variant hidden md:block">Konfirmasi</span>
</div>

<div class="w-8 h-8 rounded-full bg-surface-container-highest border-2 border-outline-variant text-on-surface-variant flex items-center justify-center text-label-form font-label-form">
                        4
                    </div>
<span class="text-caption font-caption text-on-surface-variant hidden md:block">Bayar</span>
</div>
</div>
<div class="mb-md">
<h1 class="text-h1-mobile md:text-h1 font-h1-mobile md:font-h1 text-on-surface mb-sm">Detail Penumpang</h1>
<p class="text-body font-body text-on-surface-variant">Silakan lengkapi data diri untuk setiap penumpang sesuai dengan kartu identitas yang berlaku.</p>
</div>

<!-- Passenger 1 Card -->
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant shadow-sm overflow-hidden transition-all hover:shadow-md">
<div class="bg-surface-container-low px-md py-sm border-b border-outline-variant flex items-center justify-between">
<h2 class="text-h3 font-h3 text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-primary">person</span>
                            Penumpang 1
                        </h2>
<div class="bg-primary-container text-on-primary-container px-3 py-1 rounded-full text-caption font-caption font-bold">
                            Kursi 12A
                        </div>
</div>
<div class="p-md space-y-md">
<div>
<label class="block text-label-form font-label-form text-on-surface mb-base" for="name_1">Nama Lengkap</label>
<input class="w-full rounded-lg border-outline-variant bg-surface text-body font-body focus:ring-2 focus:ring-primary focus:border-primary transition-shadow" id="name_1" name="name_1" placeholder="Sesuai KTP/SIM" required="" type="text"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div>
<label class="block text-label-form font-label-form text-on-surface mb-base" for="phone_1">Nomor HP</label>
<input class="w-full rounded-lg border-outline-variant bg-surface text-body font-body focus:ring-2 focus:ring-primary focus:border-primary transition-shadow" id="phone_1" name="phone_1" placeholder="Cth: 08123456789" required="" type="tel"/>
</div>
<div>
<label class="block text-label-form font-label-form text-on-surface mb-base flex items-center gap-2" for="id_1">
                                    No. Identitas
                                    <span class="text-caption font-caption text-outline">(Opsional)</span>
</label>
<input class="w-full rounded-lg border-outline-variant bg-surface text-body font-body focus:ring-2 focus:ring-primary focus:border-primary transition-shadow" id="id_1" name="id_1" placeholder="KTP/SIM/Paspor" type="text"/>
</div>
</div>
</div>
</div>
<!-- Passenger 2 Card -->
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant shadow-sm overflow-hidden transition-all hover:shadow-md">
<div class="bg-surface-container-low px-md py-sm border-b border-outline-variant flex items-center justify-between">
<h2 class="text-h3 font-h3 text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-primary">person</span>
                            Penumpang 2
                        </h2>
<div class="bg-primary-container text-on-primary-container px-3 py-1 rounded-full text-caption font-caption font-bold">
                            Kursi 12B
                        </div>
</div>
<div class="p-md space-y-md">
<div>
<label class="block text-label-form font-label-form text-on-surface mb-base" for="name_2">Nama Lengkap</label>
<input class="w-full rounded-lg border-outline-variant bg-surface text-body font-body focus:ring-2 focus:ring-primary focus:border-primary transition-shadow" id="name_2" name="name_2" placeholder="Sesuai KTP/SIM" required="" type="text"/>
</div>

</div>
<div>

</label>
<input class="w-full rounded-lg border-outline-variant bg-surface text-body font-body focus:ring-2 focus:ring-primary focus:border-primary transition-shadow" id="id_2" name="id_2" placeholder="KTP/SIM/Paspor" type="text"/>
</div>
</div>
</div>

<button class="w-full md:w-auto px-lg py-sm rounded-lg border border-primary text-primary font-label-form text-label-form hover:bg-primary-fixed transition-colors flex items-center justify-center gap-2" type="button">
